<div class="flex h-screen w-full font-sans bg-padel-dark fixed inset-0 z-50">
      <!-- Left: Image -->
      <div class="hidden lg:flex flex-1 relative bg-padel-dark items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-bl from-padel-dark via-padel-dark/80 to-transparent z-10"></div>
        <img src="https://images.unsplash.com/photo-1599586120429-48281b6f0ece?q=80&w=2000&auto=format&fit=crop" 
             alt="Padel Player" class="absolute inset-0 w-full h-full object-cover opacity-60">
        <div class="relative z-20 max-w-lg px-12 text-center">
          <h1 class="font-display font-bold text-5xl text-padel-white mb-6">Bergabung dengan <span class="text-padel-lime">Komunitas</span> Padel Terbaik</h1>
        </div>
      </div>
      
      <!-- Right: Form -->
      <div class="flex-1 flex flex-col justify-center px-8 sm:px-16 lg:px-24 xl:px-32 bg-padel-dark relative z-20 overflow-y-auto">
        <div class="w-full max-w-md mx-auto py-12">
          <a routerLink="/" class="text-2xl font-display font-bold tracking-tight mb-8 block lg:hidden">
            AZERX <span class="text-padel-lime animate-pulse">Padel</span>
          </a>
          
          <h2 class="text-3xl font-display font-bold text-padel-white mb-2">Buat Akun Baru</h2>
          <p class="text-padel-white/60 mb-8">Daftar sekarang untuk mulai booking lapangan.</p>
          
          @if (errorMsg) {
            <div class="bg-red-500/10 border border-red-500/50 text-red-500 px-4 py-3 rounded-lg mb-6 text-sm">
              {{ errorMsg }}
            </div>
          }
          
          @if (successMsg) {
            <div class="bg-padel-lime/10 border border-padel-lime/50 text-padel-lime px-4 py-3 rounded-lg mb-6 text-sm">
              {{ successMsg }}
            </div>
          }

          <form (submit)="onSubmit($event)" class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-padel-white/80 mb-1.5">Nama Lengkap</label>
              <input type="text" [(ngModel)]="model.name" name="name" required placeholder="Budi Santoso" class="input-field">
            </div>
            
            <div>
              <label class="block text-sm font-medium text-padel-white/80 mb-1.5">Email</label>
              <input type="email" [(ngModel)]="model.email" name="email" required placeholder="budi@email.com" class="input-field">
            </div>

            <div>
              <label class="block text-sm font-medium text-padel-white/80 mb-1.5">Nomor WA</label>
              <input type="text" [(ngModel)]="model.phone" name="phone" required placeholder="08123456789" class="input-field">
            </div>
            
            <div>
              <label class="block text-sm font-medium text-padel-white/80 mb-1.5">Kata Sandi</label>
              <input type="password" [(ngModel)]="model.password" name="password" required placeholder="Minimal 8 karakter" class="input-field">
            </div>
            
            <button type="submit" [disabled]="loading" class="btn-primary w-full flex justify-center py-3 mt-6 text-base">
              {{ loading ? 'Mendaftarkan...' : 'Daftar Sekarang' }}
            </button>
          </form>
          
          <p class="mt-8 text-center text-sm text-padel-white/60">
            Sudah punya akun? <a routerLink="/login" class="font-medium text-padel-lime hover:underline">Masuk sekarang</a>
          </p>
        </div>
      </div>
    </div>
