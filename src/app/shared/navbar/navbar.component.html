<header class="h-16 border-b border-padel-white/10 flex items-center justify-between px-6 bg-padel-dark/80 backdrop-blur-md sticky top-0 z-40">
      <div class="flex items-center gap-3">
        @if (authService.isAuthenticated()) {
          <button (click)="layoutService.toggleMobileSidebar()" class="md:hidden text-padel-white hover:text-padel-lime transition-colors p-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        }
        <a routerLink="/" class="text-xl font-display font-bold tracking-tight">
          AZERX <span class="text-padel-lime animate-pulse">Padel</span>
        </a>
      </div>
      <div class="flex items-center gap-4">
        @if (authService.currentUser()) {
          <div class="flex items-center gap-4">
            <span class="text-sm font-medium text-padel-white/90">{{ authService.currentUser()?.name }}</span>
            <div class="h-8 w-8 rounded-full bg-padel-lime text-padel-dark flex items-center justify-center font-bold text-sm">
              {{ authService.currentUser()?.name?.charAt(0) | uppercase }}
            </div>
            <button (click)="authService.logout()" class="btn-ghost text-sm font-medium px-3 py-1.5 rounded-lg border border-padel-white/10 hover:bg-padel-white/5 transition-all">Keluar</button>
          </div>
        } @else {
          <a routerLink="/login" class="btn-ghost text-sm font-medium px-4 py-2">Masuk</a>
          <a routerLink="/register" class="btn-primary text-sm px-5 py-2">Daftar</a>
        }
      </div>
    </header>
