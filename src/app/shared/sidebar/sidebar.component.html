<aside class="group w-16 hover:w-56 h-full bg-padel-card border-r border-padel-white/5 flex flex-col transition-all duration-300 overflow-hidden z-50 shrink-0">
      <div class="flex-1 py-6 flex flex-col gap-2 relative">
        <!-- Admin Links -->
        @if (authService.isAdmin()) {
          <a routerLink="/admin/dashboard" routerLinkActive="active" class="sidebar-item">
            <span class="icon">📊</span>
            <span class="label">Dasbor</span>
          </a>
          <a routerLink="/admin/courts" routerLinkActive="active" class="sidebar-item">
            <span class="icon">🎾</span>
            <span class="label">Lapangan</span>
          </a>
          <a routerLink="/admin/bookings" routerLinkActive="active" class="sidebar-item">
            <span class="icon">📅</span>
            <span class="label">Pesanan</span>
          </a>
          <a routerLink="/admin/users" routerLinkActive="active" class="sidebar-item">
            <span class="icon">👥</span>
            <span class="label">Pengguna</span>
          </a>
          <!-- <a routerLink="/admin/reviews" routerLinkActive="active" class="sidebar-item">
            <span class="icon">⭐</span>
            <span class="label">Ulasan</span>
          </a> -->
        } @else {
          <!-- Customer Links -->
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="sidebar-item">
            <span class="icon">🏠</span>
            <span class="label">Beranda</span>
          </a>
          <a routerLink="/courts" routerLinkActive="active" class="sidebar-item">
            <span class="icon">🎾</span>
            <span class="label">Cari Lapangan</span>
          </a>
          <a routerLink="/my-bookings" routerLinkActive="active" class="sidebar-item">
            <span class="icon">🗓️</span>
            <span class="label">Pesanan Saya</span>
          </a>
          <a routerLink="/profile" routerLinkActive="active" class="sidebar-item">
            <span class="icon">👤</span>
            <span class="label">Profil</span>
          </a>
        }
      </div>
    </aside>
