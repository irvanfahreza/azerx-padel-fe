<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Padel Racket -->
  <g transform="rotate(45 50 50)">
    <!-- Handle -->
    <rect x="44" y="65" width="12" height="30" rx="3" fill="#b8ff3c" />
    <polygon points="44,65 56,65 58,55 42,55" fill="#b8ff3c" />
    <!-- Racket Head -->
    <ellipse cx="50" cy="35" rx="30" ry="35" fill="#080b14" stroke="#b8ff3c" stroke-width="6" />
    <!-- Holes -->
    <circle cx="35" cy="25" r="3" fill="#b8ff3c" />
    <circle cx="50" cy="25" r="3" fill="#b8ff3c" />
    <circle cx="65" cy="25" r="3" fill="#b8ff3c" />
    
    <circle cx="30" cy="40" r="3" fill="#b8ff3c" />
    <circle cx="45" cy="40" r="3" fill="#b8ff3c" />
    <circle cx="55" cy="40" r="3" fill="#b8ff3c" />
    <circle cx="70" cy="40" r="3" fill="#b8ff3c" />
    
    <circle cx="40" cy="55" r="3" fill="#b8ff3c" />
    <circle cx="50" cy="55" r="3" fill="#b8ff3c" />
    <circle cx="60" cy="55" r="3" fill="#b8ff3c" />
  </g>
</svg>
